<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deesmos</title>
    <style>
        html {
            align-items: center;
            justify-content: center;
        }
        canvas {
            border: 1px;
            position: absolute;
            left:50%;
            top:50%;
            transform: translate(-50%,-50%);
        }
        input {
            left:20%;
            position: absolute;
            z-index: 999;
            width: 10%;
            height: 54px;
            border-radius: 4px;
            padding-left: 12px;
            font-size: 14px;
            font-weight: normal;
            border: 1px solid rgb(137, 151, 155);
            transition: border-color 150ms ease-in-out 0s;
            outline: none;
            color: rgb(33, 49, 60);
            background-color: rgb(255, 255, 255);
            padding-right: 12px;
            :hover{
                box-shadow: rgb(231 238 236) 0px 0px 0px 3px;
            }
            text-align: center;
            font-size: 30px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            
        }
        html {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

        }
        p {
            font-size: 25px;
        }
    </style>
</head>
<body>
    <p style="position: absolute; top:4.5%; left: 15%; font-weight: bolder;">x scale</p>
    <p style="position: absolute; top:9.5%; left: 15%; font-weight: bolder;">y scale</p>
    <p style="position: absolute; top:14.5%; left: 15%; font-weight: bolder;">scale</p>
    <p style="position: absolute; top:19.5%; left: 15.25%; font-weight: bolder;">f(x)</p>
    <p style="position: absolute; top:24.5%; left: 14.75%; font-weight: bolder;">resolution</p>
    <p style="position: absolute; top:29.5%; left: 14.75%; font-weight: bolder;">thickness</p>
    <input type='text' placeholder="scale x" id="x_scale" style="top:5%" value="1">
    <input type="text" placeholder="scale y" id="y_scale" style="top: 10%" value="1">
    <input type="text" placeholder="scale" id="scale" style="top: 15%" value="1">
    <input type="text" placeholder="function in terms of x" id="f" style="top: 20%" value="1">
    <input type="text" placeholder="resolution" id="res" style="top: 25%" value="1">
    <input type="text" placeholder="thickness" id="thick" style="top: 30%" value="1">
    <canvas id="canvas1" width="1200" height="1800">

    </canvas>
    <script>
        var scale_x = 1
        var scale_y = 1
        var scale = 200
        var resolution = 10000
        scale_x = scale_x * scale
        scale_y = scale_y * scale
        var thickness = 1
        document.getElementById('x_scale').value = ''
        document.getElementById('y_scale').value = ''
        document.getElementById('scale').value = ''
        document.getElementById('f').value = 'x'
        document.getElementById('res').value = '10000'
        document.getElementById('thick').value = '1'
        var c = document.getElementById('canvas1').getContext('2d')
        
        graph()
        document.getElementById('x_scale').addEventListener('input', () => {
            scale_x = parseFloat(document.getElementById('x_scale').value)
            if ((scale_x != 0) & (! Number.isNaN(scale_x))){
                scale_x = scale_x * scale
                
            }
            else{
                scale_x = scale
            }
            console.log(scale_x)

            graph()

        })
        document.getElementById('y_scale').addEventListener('input', () => {
            scale_y = parseFloat(document.getElementById('y_scale').value)
            if ((scale_y != 0)& (! Number.isNaN(scale_y))){
            scale_y = scale_y * scale
            }
            else{
                scale_y = scale
            }
            graph()
        })
        document.getElementById('scale').addEventListener('input', () => {
            prev_scale = scale
            scale = parseFloat(document.getElementById('scale').value) * 100
            if ((scale != 0) & (! Number.isNaN(scale))){
                
            scale_x = scale_x * scale/prev_scale
            scale_y = scale_y * scale/prev_scale
            }
            else{
                scale = 200
                scale_x = scale_x * scale/prev_scale
                scale_y = scale_y * scale/prev_scale
            }
            graph()
        })
        document.getElementById('f').addEventListener('input', ()=>{
            graph()
        })
        document.getElementById('res').addEventListener('input', ()=>{
            resolution = parseFloat(document.getElementById('res').value)
            if ((resolution != 0) & (! Number.isNaN(resolution))){
                graph()
            }
            else {
                resolution = 10000
                graph()
            }
        })
        document.getElementById('thick').addEventListener('input', ()=>{
            thickness = parseFloat(document.getElementById('thick').value)
            if ((thickness != 0) & (! Number.isNaN(thickness))){
                c.lineWidth = thickness
                graph()
            }
            else {
                thickness = 1
                c.lineWidth = thickness
                graph()
            }
        })
        function graph(){
        console.log('graphing...')
        function f(x){
            return eval(document.getElementById('f').value)
        }
        c.clearRect(0,0,1200,1800)
        c.fillStyle = 'blue'
        c.beginPath()
        c.moveTo(0+600,-1800)
        c.lineTo(0+600,1800)
        c.stroke()
        c.beginPath()
        c.moveTo(-1200,900)
        c.lineTo(1200,900)
        c.stroke()
        c.fillStyle = 'black'
        c.fillRect(600-2+scale_x,900-10,4,20)
        c.fillRect(600-10,900-scale_y-2,20,4)
        c.font = '20px Arial'
        c.fillText("1",600-6+scale_x,900-20)
        c.fillText('1',600+20,900-scale_y+6)

        c.fillRect(600-2-scale_x,900-10,4,20)
        c.fillRect(600-10,900+scale_y-2,20,4)
        c.font = '20px Arial'
        c.fillText("-1",600-6-scale_x,900-20)
        c.fillText('-1',600+20,900   +scale_y+6)
        for(let i = -1200/scale_x; i < 1200/scale_x; i += 2400/(scale_x * resolution)){
            c.fillStyle = "black"
            coord_value_x = i
            coord_value_y = f(i)
            coord_value_x = 600 + coord_value_x * scale_x
            coord_value_y = 900 - coord_value_y *scale_y
            c.fillRect(coord_value_x,coord_value_y,thickness,thickness)
        }
        console.log('graphed')
            }
</script>
</body>
</html>
